  NORMAL_KEYS.forEach(k => {
    const stack = game.legBetSupply[k];
    if (!stack || stack.length === 0) return;
    const c = CAMEL_BY_KEY[k];
    const colorHex = c.hex.toString(16).padStart(6, '0');
    html += `<button class="mini-btn" data-color="${k}" style="background:#${colorHex}">` +
      `${c.name}<br><span style="font-size:11px;opacity:0.85">+${stack[0]}💰</span></button>`;
  });
  html += '</div><button class="cancel-btn" onclick="window.hideSubMenu()">취소</button>';
  menu.innerHTML = html;
  menu.querySelectorAll('[data-color]').forEach(btn => {
    btn.addEventListener('click', () => {
      doActionTakeLegBet(game.players[game.currentPlayerIdx], btn.dataset.color);
    });
  });
  menu.classList.add('show');
}

function showSpectatorMenu() {
  const cur = game.players[game.currentPlayerIdx];
  const menu = $('subMenu');
  let html = '<div class="subTitle">👥 관중판 배치 — 칸 선택 (낙타 인접 불가)</div>';
  html += `<div class="subSide">
    <button class="side-btn ${cur.spectatorTile.side === 'cheer' ? 'sel' : ''}" data-side="cheer">👍 응원 (+1칸)</button>
    <button class="side-btn ${cur.spectatorTile.side === 'boo' ? 'sel' : ''}" data-side="boo">👎 야유 (-1칸)</button>
  </div>`;
  html += '<div class="subRow">';
  for (let t = 0; t < TRACK_TILES; t++) {
    const valid = isValidSpectatorPlacement(t);
    const styleEx = valid ? '' : 'opacity:0.25';
    const disabled = valid ? '' : 'disabled';
    html += `<button class="mini-btn tile-btn" data-tile="${t}" style="${styleEx}" ${disabled}>${t + 1}</button>`;
  }
  html += '</div><button class="cancel-btn" onclick="window.hideSubMenu()">취소</button>';
  menu.innerHTML = html;
  menu.querySelectorAll('[data-side]').forEach(btn => {
    btn.addEventListener('click', () => {
      cur.spectatorTile.side = btn.dataset.side;
      showSpectatorMenu(); // re-render with selected side
    });
  });
  menu.querySelectorAll('[data-tile]').forEach(btn => {
    btn.addEventListener('click', () => {
      doActionPlaceSpectator(cur, parseInt(btn.dataset.tile, 10), cur.spectatorTile.side);
    });
  });
  menu.classList.add('show');
}

function showFinalBetMenu() {
  const cur = game.players[game.currentPlayerIdx];
  const menu = $('subMenu');
  let html = '<div class="subTitle">🏁 최종 베팅 — 우승 또는 꼴찌 (게임 종료 시 정산)</div>';
  html += '<div class="subColumns">';
  ['win', 'lose'].forEach(type => {
    html += '<div class="subCol">';
    html += `<div>${type === 'win' ? '🏆 우승' : '🐢 꼴찌'} 베팅</div>`;
    html += '<div class="subRow">';
    cur.finalBetCards.forEach(k => {
      const c = CAMEL_BY_KEY[k];
      const colorHex = c.hex.toString(16).padStart(6, '0');
      html += `<button class="mini-btn" data-fb="${type}|${k}" style="background:#${colorHex}">${c.name}</button>`;
    });
    html += '</div></div>';
  });
  html += '</div><button class="cancel-btn" onclick="window.hideSubMenu()">취소</button>';
  menu.innerHTML = html;
  menu.querySelectorAll('[data-fb]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [type, color] = btn.dataset.fb.split('|');
      doActionFinalBet(cur, color, type);
    });
  });
  menu.classList.add('show');
}

function showToast(msg, color) {
  const t = $('toast');
  t.textContent = msg;
  t.style.color = color || '#FFD700';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1500);
}

window.hideSubMenu = () => $('subMenu').classList.remove('show');

// ── ACTIONS ──
async function doActionRoll(player) {
  if (game.rolling) return;
  game.rolling = true;
  hideActionUI();
  const result = await rollOneDie();
  player.coins += 1;
  if (result) {
    const c = CAMEL_BY_KEY[result.camelKey];
    showToast(`${player.name}: ${c.name} ${c.dir > 0 ? '➡' : '⬅'}${result.value}칸  +1💰`);
  }
  game.rolling = false;
  updateHUD();
  await sleep(450);

  if (checkGameEnd()) return endGame();

  if (game.diceRolledThisLeg >= 5) {
    await resolveLeg();
    if (game.gameEnded) return;
    // resolveLeg already set currentPlayerIdx to the new starting player; play their turn directly.
    nextTurn();
    return;
  }
  advancePlayer();
}

async function doActionTakeLegBet(player, color) {
  const stack = game.legBetSupply[color];
  if (!stack || stack.length === 0) return;
  const payout = stack.shift();
  player.legBets.push({ color, payout });
  showToast(`${player.name}: ${CAMEL_BY_KEY[color].name} +${payout}💰 분단경 카드`);
  hideActionUI();
  updateHUD();
  await sleep(450);
  advancePlayer();
}

async function doActionPlaceSpectator(player, tileIdx, side) {
  if (!isValidSpectatorPlacement(tileIdx)) {
    showToast('해당 칸은 배치 불가', '#EF5350');
    return;
  }
  if (player.spectatorTile.placed !== null) {
    delete game.spectatorTiles[player.spectatorTile.placed];
  }
  player.spectatorTile.side = side;
  player.spectatorTile.placed = tileIdx;
  game.spectatorTiles[tileIdx] = { playerIdx: player.idx, side };
  showToast(`${player.name}: ${tileIdx + 1}칸에 ${side === 'cheer' ? '👍응원' : '👎야유'}`);
  hideActionUI();
  updateHUD();
  await sleep(450);
  advancePlayer();
}

async function doActionFinalBet(player, color, type) {
  if (!player.finalBetCards.includes(color)) return;
  player.finalBetCards = player.finalBetCards.filter(c => c !== color);
  const cName = CAMEL_BY_KEY[color].name;
  if (type === 'win') {
    game.finalWinBets.push({ playerIdx: player.idx, color });
    showToast(`${player.name}: ${cName} 🏆우승 베팅`);
  } else {
    game.finalLoseBets.push({ playerIdx: player.idx, color });
    showToast(`${player.name}: ${cName} 🐢꼴찌 베팅`);
  }
  hideActionUI();
  updateHUD();
  await sleep(450);
  advancePlayer();
}

// ── TURN LOOP ──
function nextTurn() {
  if (game.gameEnded) return;
  updateHUD();
  const player = game.players[game.currentPlayerIdx];
  if (player.isHuman) {
    showActionUI(player);
    game.awaitingHumanAction = true;
  } else {
    game.awaitingHumanAction = false;
    setTimeout(() => aiPlayTurn(player), 750);
  }
}

function advancePlayer() {
  game.currentPlayerIdx = (game.currentPlayerIdx + 1) % game.players.length;
  nextTurn();
}

// ── AI HEURISTIC ──
async function aiPlayTurn(player) {
  const r = Math.random();
  let action;
  const canRoll = game.pyramidDice.length > 0;
  const canLegBet = NORMAL_KEYS.some(c => game.legBetSupply[c].length > 0);
  const canSpec = (player.spectatorTile.placed === null);
  const canFinal = (player.finalBetCards.length > 0);

  if (!canRoll) {
    if (canLegBet) action = 'legBet';
    else if (canSpec) action = 'spectator';
    else if (canFinal) action = 'finalBet';
    else action = 'pass';
  } else if (r < 0.55) {
    action = 'roll';
  } else if (r < 0.80 && canLegBet) {
    action = 'legBet';
  } else if (r < 0.92 && canSpec) {
    action = 'spectator';
  } else if (r < 0.97 && canFinal) {
    action = 'finalBet';
  } else {
    action = 'roll';
  }

  switch (action) {
    case 'roll':      return doActionRoll(player);
    case 'legBet':    return aiTakeLegBet(player);
    case 'spectator': return aiPlaceSpectator(player);
    case 'finalBet':  return aiFinalBet(player);
    default:          return advancePlayer();
  }
}

async function aiTakeLegBet(player) {
  const ranking = getNormalRanking();
  const candidate = ranking.find(r => game.legBetSupply[r.key] && game.legBetSupply[r.key].length > 0);
  if (!candidate) {
    const fb = NORMAL_KEYS.find(k => game.legBetSupply[k].length > 0);
    if (!fb) return doActionRoll(player);
    return doActionTakeLegBet(player, fb);
  }
  return doActionTakeLegBet(player, candidate.key);
}

async function aiPlaceSpectator(player) {
  const valid = [];
  for (let t = 0; t < TRACK_TILES; t++) if (isValidSpectatorPlacement(t)) valid.push(t);
  if (valid.length === 0) return doActionRoll(player);
  const tile = valid[Math.floor(Math.random() * valid.length)];
  return doActionPlaceSpectator(player, tile, player.spectatorTile.side);
}

async function aiFinalBet(player) {
  if (player.finalBetCards.length === 0) return doActionRoll(player);
  const ranking = getNormalRanking();
  const isWin = Math.random() < 0.6;
  const cand = isWin
    ? ranking.find(r => player.finalBetCards.includes(r.key))
    : ranking.slice().reverse().find(r => player.finalBetCards.includes(r.key));
  if (!cand) return doActionFinalBet(player, player.finalBetCards[0], 'win');
  return doActionFinalBet(player, cand.key, isWin ? 'win' : 'lose');
}

// ── LEG RESOLUTION ──
async function resolveLeg() {
  showToast(`📜 분단경 ${game.legNumber} 정산`, '#FFD700');
  await sleep(900);

  const ranking = getNormalRanking();
  const firstColor = ranking[0]?.key;
  const secondColor = ranking[1]?.key;

  const human = game.players[0];
  let humanDelta = 0;
  game.players.forEach(p => {
    let delta = 0;
    p.legBets.forEach(bet => {
      if (bet.color === firstColor) delta += bet.payout;
      else if (bet.color === secondColor) delta += SECOND_PLACE_LEG_BONUS;
      else delta += WRONG_LEG_PENALTY;
    });
    p.coins += delta;
    if (p === human) humanDelta = delta;
    p.legBets = [];
  });

  // Reset for next leg
  NORMAL_KEYS.forEach(c => game.legBetSupply[c] = LEG_BET_PAYOUTS.slice());
  resetPyramid();
  game.startingPlayerIdx = (game.startingPlayerIdx + 1) % game.players.length;
  game.currentPlayerIdx = game.startingPlayerIdx;
  game.legNumber++;

  clearGameDice();
  updateHUD();

  if (humanDelta !== 0) {
    showToast(`나 ${humanDelta >= 0 ? '+' : ''}${humanDelta} 💰`, humanDelta > 0 ? '#66BB6A' : '#EF5350');
  }
  await sleep(1300);
}

// ── GAME OVER ──
async function endGame() {
  game.gameEnded = true;
  game.active = false;
  hideActionUI();

  const ranking = getNormalRanking();
  const winnerColor = ranking[0]?.key;
  const loserColor = ranking[ranking.length - 1]?.key;

  let winIdx = 0, loseIdx = 0;
  game.finalWinBets.forEach(bet => {
    const p = game.players[bet.playerIdx];
    let delta;
    if (bet.color === winnerColor) { delta = FINAL_BET_PAYOUTS[winIdx] || 0; winIdx++; }
    else delta = WRONG_FINAL_PENALTY;
    p.coins += delta;
  });
  game.finalLoseBets.forEach(bet => {
    const p = game.players[bet.playerIdx];
    let delta;
    if (bet.color === loserColor) { delta = FINAL_BET_PAYOUTS[loseIdx] || 0; loseIdx++; }
    else delta = WRONG_FINAL_PENALTY;
    p.coins += delta;
  });

  const sortedPlayers = game.players.slice().sort((a, b) => b.coins - a.coins);

  $('gameUI').classList.remove('show');
  $('gameOverTitle').textContent = '🏁 게임 종료!';
  $('winnerText').textContent = `🏆 우승: ${sortedPlayers[0].name} (${sortedPlayers[0].coins}💰)`;

  let html = '<div style="color:#FFD700;font-size:11px;letter-spacing:2px;margin:6px 0">최종 낙타 순위</div>';
  ranking.forEach((r, i) => {
    const c = CAMEL_BY_KEY[r.key];
    const colorHex = c.hex.toString(16).padStart(6, '0');
    const posLabel = r.finished ? '🏁 완주' : `#${r.tile + 1}칸`;
    html += `<div class="fr-row"><span class="rk">${i+1}</span>` +
      `<span class="sw" style="background:#${colorHex}"></span>` +
      `<span class="nm">${c.name} 낙타</span><span class="pos">${posLabel}</span></div>`;
  });
  html += '<div style="color:#FFD700;font-size:11px;letter-spacing:2px;margin:14px 0 6px">플레이어 순위</div>';
  sortedPlayers.forEach((p, i) => {
    html += `<div class="fr-row"><span class="rk">${i+1}</span>` +
      `<span class="nm">${p.name}</span><span class="pos">${p.coins}💰</span></div>`;
  });
  $('finalRanking').innerHTML = html;
  const winName = winnerColor ? CAMEL_BY_KEY[winnerColor].name : '?';
  const loseName = loserColor ? CAMEL_BY_KEY[loserColor].name : '?';
  $('finalCoins').textContent = `🏆 ${winName} 우승  ·  🐢 ${loseName} 꼴찌`;

  setTimeout(() => $('gameOverUI').classList.add('show'), 600);
}

// ── START / RESTART ──
function startGame() {
  document.getElementById('ui').style.transition = 'opacity 0.5s';
  document.getElementById('ui').style.opacity = '0';
  document.getElementById('ui').style.pointerEvents = 'none';
  document.getElementById('info').style.opacity = '0';
  titleDiceDisabled = true;
  diceAnimating = false;
  isSpawning = false;
  while (diceGroup.children.length) diceGroup.remove(diceGroup.children[0]);

  targetHeight = 12;
  targetCamDist = 11;
  targetAngle = 0;

  game.inGame = true;
  game.active = true;
  initGameState();
  clearGameDice();
  updateHUD();

  setTimeout(() => {
    $('gameUI').classList.add('show');
    nextTurn();
  }, 700);
}

function restartGame() {
  $('gameOverUI').classList.remove('show');
  CAMELS.forEach(c => { game.camelMeshes[c.key].visible = false; });
  setTimeout(() => startGame(), 150);
}
